
<style>
*{box-sizing:border-box;margin:0;padding:0;}
div,input,textarea,button,span,label{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;}
.wrap{background:#EEF7E0;border-radius:20px;padding:0 1.5rem 1.5rem;position:relative;overflow:hidden;}
.grass{position:absolute;top:0;left:0;right:0;bottom:0;background-image:radial-gradient(circle,#C8E6A0 1.2px,transparent 1.2px);background-size:22px 22px;opacity:0.32;pointer-events:none;border-radius:20px;}
.card{background:#FFFEF5;border-radius:20px;border:2.5px solid #B5D98B;padding:1rem 1.25rem;position:relative;}
.tab-btn{background:none;border:none;border-bottom:3px solid transparent;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;color:#8AB865;margin-bottom:-1.5px;font-family:'Malgun Gothic','맑은 고딕',sans-serif;}
.tab-btn.active{color:#4A8C2A;border-bottom-color:#4A8C2A;}
.acnh-input{width:100%;background:#F5FDED;border:2px solid #B5D98B;border-radius:12px;padding:8px 12px;font-size:14px;font-family:'Malgun Gothic','맑은 고딕',sans-serif;color:#3A5A1A;outline:none;}
.acnh-input:focus{border-color:#6DBE7E;background:#EDFAE0;}
.acnh-btn{width:100%;padding:12px;font-size:15px;font-weight:700;background:#6DBE7E;color:#fff;border:none;border-radius:16px;cursor:pointer;font-family:'Malgun Gothic','맑은 고딕',sans-serif;transition:transform 0.15s;border-bottom:4px solid #4A9A5A;}
.acnh-btn:hover{background:#5BAD6E;transform:translateY(-1px);}
.acnh-btn:active{transform:translateY(2px);border-bottom-width:2px;}
.star-pick{cursor:pointer;font-size:22px;color:#D4C58A;line-height:1;transition:color 0.15s;}
.star-pick.lit{color:#E8C438;}
.cafe-row{background:#FFFEF5;border:2px solid #C8E6A0;border-radius:16px;padding:12px 16px;margin-bottom:8px;}
.del-btn{background:#FFD6D6;border:none;border-radius:8px;cursor:pointer;color:#C05050;font-size:13px;font-weight:700;padding:3px 8px;font-family:'Malgun Gothic','맑은 고딕',sans-serif;}
.stat-card{background:#FFFEF5;border:2.5px solid #B5D98B;border-radius:16px;padding:14px 8px;text-align:center;}
.stamp-slot{width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);}
.stamp-slot.empty{border:2.5px dashed #B5D98B;background:transparent;}
.stamp-slot.empty::after{content:'';width:16px;height:16px;border-radius:50%;background:#D8F0C0;display:block;}
</style>

<div class="wrap">
  <div class="grass"></div>

  <div style="position:relative;margin:0 -1.5rem 1.25rem;height:140px;overflow:hidden;border-radius:20px 20px 0 0;background:#A8D8A8;">
    <img src="https://res.cloudinary.com/dq3uhnrdc/image/upload/v1776644990/%EB%8B%A4%EC%9A%B4%EB%A1%9C%EB%93%9C_zppx33.jpg"
      style="width:100%;height:100%;object-fit:cover;object-position:center;display:block;"
      onerror="this.style.display='none';document.getElementById('hf').style.display='flex';" />
    <div id="hf" style="display:none;width:100%;height:100%;align-items:center;justify-content:center;">
      <div style="font-size:13px;font-weight:700;color:#4A8C2A;">나만의 섬에 오신 걸 환영해요 🌿</div>
    </div>
    <div style="position:absolute;bottom:0;left:0;right:0;padding:12px 20px;background:linear-gradient(transparent,rgba(60,100,30,0.65));">
      <div style="font-size:11px;letter-spacing:0.15em;color:#D8F5B0;font-weight:700;">MY ISLAND CAFÉ</div>
      <div style="font-size:20px;font-weight:700;color:#fff;">나의 섬 카페 기록</div>
    </div>
  </div>

  <div id="stats-area" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;position:relative;"></div>

  <div class="card" style="margin-bottom:1rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <div style="font-size:14px;font-weight:700;color:#3A6A1A;">🍀 스탬프 카드</div>
      <div id="stamp-progress" style="font-size:13px;font-weight:700;color:#6DBE7E;background:#EEF7E0;padding:3px 10px;border-radius:20px;"></div>
    </div>
    <div id="stamps-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;justify-items:center;"></div>
    <div id="stamp-msg" style="text-align:center;font-size:13px;font-weight:700;color:#8AB865;margin-top:12px;min-height:20px;"></div>
  </div>

  <div style="display:flex;border-bottom:2px solid #C8E6A0;margin-bottom:1rem;">
    <button class="tab-btn active" id="btn-add" onclick="switchTab('add')">카페 추가 ✦</button>
    <button class="tab-btn" id="btn-list" onclick="switchTab('list')">방문 목록</button>
  </div>

  <div id="tab-add">
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div>
        <label style="font-size:13px;font-weight:700;color:#4A8C2A;display:block;margin-bottom:4px;">카페 이름 *</label>
        <input class="acnh-input" id="f-name" type="text" placeholder="예: 어니언 마포점" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div>
          <label style="font-size:13px;font-weight:700;color:#4A8C2A;display:block;margin-bottom:4px;">동네</label>
          <input class="acnh-input" id="f-area" type="text" placeholder="예: 합정" />
        </div>
        <div>
          <label style="font-size:13px;font-weight:700;color:#4A8C2A;display:block;margin-bottom:4px;">날짜</label>
          <input class="acnh-input" id="f-date" type="date" />
        </div>
      </div>
      <div>
        <label style="font-size:13px;font-weight:700;color:#4A8C2A;display:block;margin-bottom:4px;">별점</label>
        <div style="display:flex;gap:4px;margin-top:4px;">
          <span class="star-pick" onclick="setRating(1)">★</span>
          <span class="star-pick" onclick="setRating(2)">★</span>
          <span class="star-pick" onclick="setRating(3)">★</span>
          <span class="star-pick" onclick="setRating(4)">★</span>
          <span class="star-pick" onclick="setRating(5)">★</span>
        </div>
      </div>
      <div>
        <label style="font-size:13px;font-weight:700;color:#4A8C2A;display:block;margin-bottom:4px;">한줄 메모</label>
        <textarea class="acnh-input" id="f-memo" placeholder="오늘 카페 한 줄 소감 🌿" style="height:68px;resize:none;"></textarea>
      </div>
      <button class="acnh-btn" onclick="addCafe()">도장 찍기 🍀</button>
    </div>
  </div>

  <div id="tab-list" style="display:none;">
    <div id="cafe-list"></div>
  </div>
</div>

<script>
const CLOVER='https://res.cloudinary.com/dq3uhnrdc/image/upload/v1776644768/four-leaf-clover_1f340_cwzyxe.png';
let cafes=[],selectedRating=0;
const KEY='cafe-acnh-v1';
async function load(){try{const r=await window.storage.get(KEY);if(r&&r.value)cafes=JSON.parse(r.value);}catch(e){cafes=[];}render();}
async function save(){try{await window.storage.set(KEY,JSON.stringify(cafes));}catch(e){}}
function setRating(n){selectedRating=n;document.querySelectorAll('.star-pick').forEach((s,i)=>s.classList.toggle('lit',i<n));}
function switchTab(t){document.getElementById('tab-add').style.display=t==='add'?'':'none';document.getElementById('tab-list').style.display=t==='list'?'':'none';document.getElementById('btn-add').classList.toggle('active',t==='add');document.getElementById('btn-list').classList.toggle('active',t==='list');if(t==='list')renderList();}
function addCafe(){const name=document.getElementById('f-name').value.trim();if(!name){document.getElementById('f-name').focus();return;}cafes.unshift({id:Date.now(),name,area:document.getElementById('f-area').value.trim()||'',date:document.getElementById('f-date').value||today(),rating:selectedRating,memo:document.getElementById('f-memo').value.trim()});save();document.getElementById('f-name').value='';document.getElementById('f-area').value='';document.getElementById('f-memo').value='';selectedRating=0;document.querySelectorAll('.star-pick').forEach(s=>s.classList.remove('lit'));render(true);}
function deleteCafe(id){cafes=cafes.filter(c=>c.id!==id);save();render();renderList();}
function today(){return new Date().toISOString().slice(0,10);}
function render(pop){renderStats();renderStamps(pop);}
function renderStats(){const total=cafes.length;const areas={};cafes.forEach(c=>{if(c.area)areas[c.area]=(areas[c.area]||0)+1;});const top=Object.entries(areas).sort((a,b)=>b[1]-a[1])[0];const rated=cafes.filter(c=>c.rating>0);const avg=rated.length?(rated.reduce((s,c)=>s+c.rating,0)/rated.length).toFixed(1):'-';document.getElementById('stats-area').innerHTML=`<div class="stat-card"><div style="font-size:11px;font-weight:700;color:#8AB865;margin-bottom:4px;">총 방문</div><div style="font-size:22px;font-weight:700;color:#3A6A1A;">${total}<span style="font-size:13px;font-weight:400;color:#8AB865;"> 곳</span></div></div><div class="stat-card"><div style="font-size:11px;font-weight:700;color:#8AB865;margin-bottom:4px;">자주 간 동네</div><div style="font-size:${top?'15px':'22px'};font-weight:700;color:#3A6A1A;">${top?top[0]:'—'}</div></div><div class="stat-card"><div style="font-size:11px;font-weight:700;color:#8AB865;margin-bottom:4px;">평균 별점</div><div style="font-size:22px;font-weight:700;color:#3A6A1A;">${avg}${avg!=='-'?'<span style="font-size:14px;color:#E8C438;">★</span>':''}</div></div>`;}
function renderStamps(pop){
  const total=cafes.length;const cur=total%10;const cards=Math.floor(total/10);
  document.getElementById('stamp-progress').textContent=`${cur} / 10`;
  const grid=document.getElementById('stamps-grid');grid.innerHTML='';
  for(let i=0;i<10;i++){
    const on=i<cur;
    const d=document.createElement('div');
    d.className='stamp-slot '+(on?'filled':'empty');
    if(on){const img=document.createElement('img');img.src=CLOVER;img.width=36;img.height=36;img.style.display='block';d.appendChild(img);}
    if(pop&&i===cur-1)setTimeout(()=>{d.style.transform='scale(1.4) rotate(-12deg)';setTimeout(()=>{d.style.transform='scale(1) rotate(0deg)';},380);},50);
    grid.appendChild(d);
  }
  const msg=document.getElementById('stamp-msg');
  if(total===0)msg.innerHTML='첫 카페를 기록해보세요 🌿';
  else if(cur===0)msg.innerHTML=`<span style="color:#4A8C2A;">카드 완성! ${cards}번째 달성 🍀✦</span>`;
  else msg.textContent=`🍀 ${10-cur}개 더 채우면 카드 완성!`;
}
function renderList(){const el=document.getElementById('cafe-list');if(!cafes.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:#8AB865;font-size:14px;font-weight:700;">아직 방문 기록이 없어요 🌿</div>';return;}el.innerHTML=cafes.map(c=>`<div class="cafe-row"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:700;color:#3A6A1A;">${c.name}</div><div style="font-size:12px;color:#8AB865;margin-top:2px;">${[c.area,c.date].filter(Boolean).join(' · ')}</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px;">${c.rating?`<span style="font-size:13px;color:#E8C438;">${'★'.repeat(c.rating)}<span style="color:#D4C58A">${'★'.repeat(5-c.rating)}</span></span>`:''}<button class="del-btn" onclick="deleteCafe(${c.id})">삭제</button></div></div>${c.memo?`<div style="font-size:13px;color:#6A9A4A;margin-top:8px;padding-top:8px;border-top:2px dashed #C8E6A0;">${c.memo}</div>`:''}</div>`).join('');}
document.getElementById('f-date').value=today();
load();
</script>
